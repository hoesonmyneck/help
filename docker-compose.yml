version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cbdi
      POSTGRES_USER: cbdi
      POSTGRES_PASSWORD: cbdi123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbdi"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cbdi:cbdi123@db:5432/cbdi
    volumes:
      - ./backend/static:/app/static

volumes:
  pgdata:
